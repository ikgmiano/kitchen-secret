<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forms by Yen</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon.png">
    <meta name="theme-color" content="#3a151b">
    
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap');

        :root { 
            --primary: #cca76a; /* Gold */
            --primary-hover: #b59258;
            --bg: #3a151b; /* Deep Burgundy */
            --card: #4a1d24; /* Lighter Burgundy for cards */
            --text: #f4e9d8; /* Off-white / Cream */
            --text-muted: #cda87c;
            --border: #632d35;
            --sub-bg: #321217;
            --danger: #ff6b6b;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Lato', sans-serif;
            -webkit-tap-highlight-color: transparent; 
        }

        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; font-weight: normal; }

        header { 
            background: var(--bg); 
            color: var(--primary); 
            padding: 1.5rem 1rem; 
            position: sticky; 
            top: 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }
        
        .brand-title {
            text-align: center;
            flex: 1;
        }
        .brand-title h1 { font-size: 1.8rem; letter-spacing: 1px; line-height: 1; margin-bottom: 0.2rem; }
        .brand-title p { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); }

        .container { padding: 1rem; max-width: 600px; margin: 0 auto; padding-bottom: 2rem; }
        .card { background: var(--card); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        
        h2 { border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; color: var(--primary); font-size: 1.3rem; margin-bottom: 0.8rem; }
        h3 { margin-bottom: 0.5rem; font-size: 1.1rem; }

        button { 
            background: var(--primary); 
            color: var(--bg); 
            border: none; 
            padding: 0.8rem 1.2rem; 
            border-radius: 6px; 
            font-size: 0.95rem; 
            font-weight: bold; 
            cursor: pointer; 
            transition: opacity 0.2s, transform 0.1s; 
            font-family: 'Lato', sans-serif;
        }
        button:active { opacity: 0.8; transform: scale(0.98); }
        button.outline { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
        button.danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        button.small { padding: 0.4rem 0.8rem; font-size: 0.85rem; }

        textarea, input[type="number"], input[type="text"]:not(.header-input), input[type="password"], select { 
            width: 100%; 
            padding: 0.8rem; 
            border: 1px solid var(--border); 
            border-radius: 6px; 
            font-size: 1rem; 
            margin-bottom: 0.5rem;
            background: var(--sub-bg);
            color: var(--text);
            font-family: 'Lato', sans-serif;
        }
        textarea:focus, input:focus, select:focus { outline: none; border-color: var(--primary); }
        ::placeholder { color: #885b63; }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 0.3rem; font-size: 0.85rem; color: var(--primary); text-transform: uppercase; letter-spacing: 1px;}

        .ingredient-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0.8rem 0.5rem; 
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
            background: var(--card); /* required for sortable styling */
        }
        .ingredient-item:last-child { border-bottom: none; }
        
        .sub-recipe-link { color: var(--primary); font-weight: 700; display: flex; align-items: center; gap: 0.5rem; cursor: pointer; user-select: none; }
        .toggle-icon { display: inline-block; width: 15px; display: flex; align-items: center; transition: transform 0.2s; }
        .toggle-icon.open { transform: rotate(90deg); }

        .scale-controls { display: flex; align-items: center; gap: 1rem; background: var(--card); padding: 1rem; border-radius: 12px; margin-bottom: 1rem; justify-content: space-between;}
        .scale-controls div { flex: 1; text-align: center; }
        .scale-controls input { font-size: 1.2rem; font-weight: bold; text-align: center; margin: 0; padding: 0.5rem; color: var(--primary); border-color: var(--primary); }

        .empty-state { text-align: center; color: var(--text-muted); padding: 2rem 0; font-style: italic; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(3px);
            display: flex; justify-content: center; align-items: center;
            z-index: 100; padding: 1rem;
        }
        .modal-card {
            background: var(--bg); border: 1px solid var(--primary); border-radius: 12px; padding: 1.5rem;
            width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-height: 90vh; overflow-y: auto;
        }
        .modal-actions { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1.5rem; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .header-input {
            background: transparent; 
            border: none; 
            border-bottom: 1px dashed var(--primary); 
            color: var(--primary); 
            font-size: 1.5rem; 
            font-family: 'Playfair Display', serif;
            text-align: center;
            width: 100%; 
            outline: none; 
            padding: 0.2rem; 
            border-radius: 0;
        }
        .header-input:focus { border-bottom-style: solid; background: rgba(255,255,255,0.05); }

        .header-select {
            background: transparent;
            color: var(--text-muted);
            border: none;
            border-bottom: 1px solid rgba(204, 167, 106, 0.4);
            font-size: 0.9rem;
            text-align: center;
            text-align-last: center;
            width: auto;
            margin: 0 auto;
            display: block;
            padding: 0.2rem;
            outline: none;
            cursor: pointer;
        }
        .header-select option { color: var(--text); background: var(--card); }

        .action-btn {
            background: none; border: none; padding: 0; display: flex; align-items: center; justify-content: center;
            width: 28px; height: 28px; border-radius: 4px; cursor: pointer; transition: background 0.2s;
        }
        .action-btn:active { background: rgba(255,255,255,0.1); }
        .btn-edit { color: var(--primary); }
        .btn-link { color: #8ecae6; }
        .btn-remove { color: var(--danger); }
        
        .drag-handle { cursor: grab; color: var(--border); margin-right: 12px; font-size: 1.4rem; user-select: none; display: flex; align-items: center; }
        .drag-handle:active { cursor: grabbing; color: var(--primary); }
        .sortable-ghost { opacity: 0.4; }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="modal-root"></div>

    <script>
        // State Management
        let recipes = JSON.parse(localStorage.getItem('kitchen_secret_recipes')) || {};
        let folders = JSON.parse(localStorage.getItem('kitchen_secret_folders')) || ['Cakes', 'Breads', 'Subcomponents'];
        let currentView = 'home'; // 'home', 'folder', 'recipe'
        let currentFolder = null;
        let currentRecipeId = null;
        let currentScale = 1; 
        let expandedNodes = new Set(); 
        let cloudSaveTimeout;

        // Data Migration & Fallback
        if (Object.keys(recipes).length === 0) {
            recipes = {
                "1": { id: "1", name: "Chocolate Cake", category: "Cakes", orderIndex: Date.now(), baseBatch: 1, ingredients: [
                    { name: "Chocolate Cake Layer", qty: 2, unit: "g", isSub: true, subId: "2", scaleMode: "multiplier" }
                ], notes: "Assemble carefully." },
                "2": { id: "2", name: "Chocolate Cake Layer", category: "Subcomponents", orderIndex: Date.now()+1, baseBatch: 4, ingredients: [
                    { name: "Flour", qty: 250, unit: "g", isSub: false },
                    { name: "Sugar", qty: 200, unit: "g", isSub: false },
                    { name: "Cocoa powder", qty: 50, unit: "g", isSub: false }
                ], notes: "Bake at 180°C." }
            };
            saveData(false);
        }

        function syncDataStructure() {
            Object.values(recipes).forEach(r => {
                if (r.category && !folders.includes(r.category) && r.category !== 'Uncategorized') folders.push(r.category);
                if (!r.orderIndex) r.orderIndex = Date.now() + Math.random();
                if (!r.baseBatch) r.baseBatch = 1;
            });
            if (!folders.includes('Uncategorized')) folders.push('Uncategorized');
            folders = [...new Set(folders)];
        }
        syncDataStructure();

        function triggerCloudSave() {
            const config = JSON.parse(localStorage.getItem('kitchen_secret_gh_config')) || {};
            if (config.autoSave && config.token) {
                clearTimeout(cloudSaveTimeout);
                cloudSaveTimeout = setTimeout(() => saveToCloud(false), 3000);
            }
        }

        function saveData(triggerCloud = true) { 
            localStorage.setItem('kitchen_secret_recipes', JSON.stringify(recipes)); 
            localStorage.setItem('kitchen_secret_folders', JSON.stringify(folders));
            if (triggerCloud) triggerCloudSave();
        }
        
        function generateId() { return Date.now().toString() + Math.floor(Math.random()*1000); }

        // Weight & Scaling Core Logic
        function calculateRecipeWeight(recipeId, visited = new Set()) {
            if (visited.has(recipeId)) return 0;
            visited.add(recipeId);
            
            const recipe = recipes[recipeId];
            if (!recipe) return 0;
            
            let total = 0;
            recipe.ingredients.forEach(ing => {
                if (ing.isSub && recipes[ing.subId]) {
                    const subRecipe = recipes[ing.subId];
                    if (ing.scaleMode === 'weight') {
                        total += parseFloat(ing.targetWeight) || 0;
                    } else if (ing.scaleMode === 'batch') {
                        const ratio = (parseFloat(ing.targetBatch) || 0) / (parseFloat(subRecipe.baseBatch) || 1);
                        total += (ratio * calculateRecipeWeight(ing.subId, new Set(visited)));
                    } else {
                        total += ((parseFloat(ing.qty) || 1) * calculateRecipeWeight(ing.subId, new Set(visited)));
                    }
                } else {
                    total += parseFloat(ing.qty) || 0;
                }
            });
            return total;
        }

        function getEffectiveMultiplier(ing) {
            if (ing.isSub && recipes[ing.subId]) {
                const subRecipe = recipes[ing.subId];
                if (ing.scaleMode === 'weight') {
                    const baseWeight = calculateRecipeWeight(ing.subId);
                    return baseWeight > 0 ? ((parseFloat(ing.targetWeight) || 0) / baseWeight) : 0;
                } else if (ing.scaleMode === 'batch') {
                    const baseBatch = parseFloat(subRecipe.baseBatch) || 1;
                    return (parseFloat(ing.targetBatch) || 0) / baseBatch;
                }
            }
            return parseFloat(ing.qty) || 1;
        }

        const appDiv = document.getElementById('app');
        const modalRoot = document.getElementById('modal-root');

        function render() {
            if (currentView === 'home') renderHome();
            else if (currentView === 'folder') renderFolder(currentFolder);
            else if (currentView === 'recipe') renderRecipe(currentRecipeId);
            initSortable(); 
        }

        // --- SortableJS Initialization ---
        function initSortable() {
            const folderList = document.getElementById('folder-list');
            if (folderList) {
                Sortable.create(folderList, {
                    handle: '.drag-handle',
                    animation: 150,
                    onEnd: function (evt) {
                        const item = folders.splice(evt.oldIndex, 1)[0];
                        folders.splice(evt.newIndex, 0, item);
                        saveData();
                    }
                });
            }

            const recipeList = document.getElementById('recipe-list');
            if (recipeList) {
                Sortable.create(recipeList, {
                    handle: '.drag-handle',
                    animation: 150,
                    onEnd: function (evt) {
                        const folderRecipes = Object.values(recipes)
                            .filter(r => (r.category || 'Uncategorized') === currentFolder)
                            .sort((a,b) => a.orderIndex - b.orderIndex);
                        
                        const item = folderRecipes.splice(evt.oldIndex, 1)[0];
                        folderRecipes.splice(evt.newIndex, 0, item);
                        
                        folderRecipes.forEach((r, idx) => {
                            recipes[r.id].orderIndex = Date.now() + idx;
                        });
                        saveData();
                    }
                });
            }

            const ingList = document.getElementById('ingredients-list');
            if (ingList) {
                Sortable.create(ingList, {
                    handle: '.drag-handle',
                    animation: 150,
                    onEnd: function (evt) {
                        const ings = recipes[currentRecipeId].ingredients;
                        const item = ings.splice(evt.oldIndex, 1)[0];
                        ings.splice(evt.newIndex, 0, item);
                        saveData();
                    }
                });
            }
        }

        // --- Views ---
        function renderHome() {
            window.scrollTo(0, 0);
            syncDataStructure();

            appDiv.innerHTML = `
                <header>
                    <button class="small outline" onclick="promptCloudConfig()">☁️ Sync</button>
                    
                    <div class="brand-title">
                        <h1>forms by yen</h1>
                        <p>curated flavors</p>
                    </div>

                    <div style="display:flex; gap:0.3rem;">
                        <input type="file" onchange="importData(event)" style="display:none" id="importFile">
                        <button class="small outline" onclick="document.getElementById('importFile').click()">Import</button>
                        <button class="small outline" onclick="exportData()">Export</button>
                    </div>
                </header>
                <div class="container" style="margin-top: 1rem;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1rem;">
                        <h2>Categories</h2>
                        <button class="small" onclick="promptAddFolder()">+ Folder</button>
                    </div>
                    <div class="card" id="folder-list">
                        ${folders.length === 0 ? '<div class="empty-state">No folders found.</div>' : ''}
                        ${folders.map(f => {
                            const count = Object.values(recipes).filter(r => (r.category || 'Uncategorized') === f).length;
                            return `
                                <div class="ingredient-item">
                                    <div style="display:flex; align-items:center;">
                                        <span class="drag-handle">☰</span>
                                        <div onclick="goToFolder('${f.replace(/'/g, "\\'")}')" style="cursor:pointer;">
                                            <h3 style="margin:0; font-family:'Playfair Display', serif;">${f}</h3>
                                            <small style="color: var(--text-muted);">${count} items</small>
                                        </div>
                                    </div>
                                    <span style="color:var(--primary);" onclick="goToFolder('${f.replace(/'/g, "\\'")}')" style="cursor:pointer;">➔</span>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        function renderFolder(folderName) {
            window.scrollTo(0, 0);
            const folderRecipes = Object.values(recipes)
                .filter(r => (r.category || 'Uncategorized') === folderName)
                .sort((a,b) => a.orderIndex - b.orderIndex);
            
            appDiv.innerHTML = `
                <header style="flex-direction: column; align-items: stretch;">
                    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 0.8rem;">
                        <button class="small outline" onclick="goHome()">← Back</button>
                        <button class="small" onclick="promptAddRecipe('${folderName.replace(/'/g, "\\'")}')">+ Recipe</button>
                    </div>
                    <div style="text-align: center; width: 100%;">
                        <input type="text" class="header-input" value="${folderName.replace(/"/g, '&quot;')}" 
                               onblur="confirmRenameFolder('${folderName.replace(/'/g, "\\'")}', this.value)" 
                               onkeypress="if(event.key === 'Enter') this.blur();">
                    </div>
                </header>
                <div class="container" style="margin-top: 1rem;">
                    <div class="card" id="recipe-list">
                        ${folderRecipes.length === 0 ? '<div class="empty-state">Folder is empty. Add a recipe!</div>' : ''}
                        ${folderRecipes.map(r => `
                            <div class="ingredient-item">
                                <div style="display:flex; align-items:center; flex:1;">
                                    <span class="drag-handle">☰</span>
                                    <div onclick="goToRecipe('${r.id}')" style="cursor:pointer; flex:1;">
                                        <h3 style="margin:0; color:var(--text);">${r.name}</h3>
                                        <small style="color:var(--text-muted);">Yield: ${r.baseBatch}</small>
                                    </div>
                                </div>
                                <span style="color:var(--primary); cursor:pointer;" onclick="goToRecipe('${r.id}')">➔</span>
                            </div>
                        `).join('')}
                    </div>
                    ${folderName !== 'Uncategorized' ? `
                        <button class="danger outline" style="width:100%; margin-top: 1rem; padding: 0.8rem;" onclick="promptDeleteFolder('${folderName.replace(/'/g, "\\'")}')">Delete Folder</button>
                    ` : ''}
                </div>
            `;
        }

        function renderIngredientTree(ingredients, parentScale, level, pathId) {
            let html = '';
            const linkIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>`;
            const editIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="16 3 21 8 8 21 3 21 3 16 16 3"></polygon></svg>`;
            const deleteIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
            const chevronIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>`;

            ingredients.forEach((ing, index) => {
                const currentPath = `${pathId}-${index}`;
                const subRecipe = ing.isSub ? recipes[ing.subId] : null;
                const displayName = ing.isSub ? (subRecipe ? subRecipe.name : `${ing.name} (Missing)`) : ing.name;

                let effectiveMultiplier = getEffectiveMultiplier(ing);
                let displayValue = 0;
                let displayUnit = 'g';
                let isTargetWeight = false;

                if (ing.isSub) {
                    if (ing.scaleMode === 'weight') {
                        displayValue = (ing.targetWeight || 0) * parentScale;
                        displayUnit = 'g';
                        isTargetWeight = true;
                    } else if (ing.scaleMode === 'batch') {
                        displayValue = (ing.targetBatch || 0) * parentScale;
                        displayUnit = 'batch';
                    } else {
                        displayValue = (ing.qty || 1) * parentScale;
                        displayUnit = 'x';
                    }
                } else {
                    displayValue = (ing.qty || 0) * parentScale;
                    displayUnit = 'g';
                }

                let valueHtml = '';
                if (isTargetWeight) {
                    valueHtml = `<div style="text-align: right; line-height: 1.1;"><span style="color:var(--primary);"><b>${Number.isInteger(displayValue) ? displayValue : displayValue.toFixed(2)}</b> ${displayUnit}</span><br><small style="font-size: 0.7rem; color: var(--text-muted);">(target)</small></div>`;
                } else {
                    valueHtml = `<span style="color:var(--primary);"><b>${Number.isInteger(displayValue) ? displayValue : displayValue.toFixed(2)}</b> ${displayUnit}</span>`;
                }

                const passDownScale = effectiveMultiplier * parentScale;

                let actionButtons = '';
                if (level === 0) {
                    actionButtons = `
                        <div style="display:flex; gap:0.4rem; margin-left:0.8rem; align-items:center;">
                            ${ing.isSub && subRecipe ? `<button class="action-btn btn-link" onclick="goToRecipe('${ing.subId}')" title="Go to Recipe">${linkIcon}</button>` : ''}
                            <button class="action-btn btn-edit" onclick="promptEditIngredient('${currentRecipeId}', ${index})" title="Edit">${editIcon}</button>
                            <button class="action-btn btn-remove" onclick="promptRemoveIngredient('${currentRecipeId}', ${index})" title="Remove">${deleteIcon}</button>
                        </div>
                    `;
                }
                
                html += `
                    <div class="ingredient-item" style="margin-left: ${level * 10}px; background: ${ing.isSub && expandedNodes.has(currentPath) ? 'var(--sub-bg)' : 'transparent'}; border-left: ${level > 0 ? '1px solid var(--border)' : 'none'};">
                        <span style="display:flex; align-items:center;">
                            ${level === 0 ? `<span class="drag-handle" title="Drag to reorder">☰</span>` : ''}
                            ${ing.isSub && subRecipe ? `
                                <span class="sub-recipe-link" onclick="toggleSub('${currentPath}')">
                                    <span class="toggle-icon ${expandedNodes.has(currentPath) ? 'open' : ''}">${chevronIcon}</span> ${displayName}
                                </span>
                            ` : `<span>${displayName}</span>`}
                        </span>
                        <span style="display:flex; align-items:center;">
                            ${valueHtml}
                            ${actionButtons}
                        </span>
                    </div>
                `;

                if (ing.isSub && subRecipe && expandedNodes.has(currentPath)) {
                    html += renderIngredientTree(subRecipe.ingredients, passDownScale, level + 1, currentPath);
                    const componentTotalWeight = calculateRecipeWeight(subRecipe.id) * passDownScale;
                    html += `
                        <div class="ingredient-item" style="margin-left: ${(level + 1) * 10}px; background: var(--sub-bg); font-style: italic; color: var(--text-muted); border-left: 1px solid var(--primary); border-top: 1px dashed var(--border);">
                            <span>↳ Total ${displayName} Weight:</span>
                            <span><b>${Number.isInteger(componentTotalWeight) ? componentTotalWeight : componentTotalWeight.toFixed(2)}</b> g</span>
                        </div>
                    `;
                }
            });
            return html;
        }

        function renderRecipe(id) {
            const recipe = recipes[id];
            if (!recipe) return goHome();

            const totalRecipeWeight = calculateRecipeWeight(id) * currentScale;
            const currentCat = recipe.category || 'Uncategorized';

            appDiv.innerHTML = `
                <header style="flex-direction: column; align-items: stretch; padding-bottom: 0.8rem;">
                    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 0.8rem;">
                        <button class="small outline" onclick="goToFolder('${currentCat.replace(/'/g, "\\'")}')">← Folder</button>
                        <div style="display:flex; gap:0.3rem;">
                            <button class="small outline" onclick="promptCopyRecipe('${id}')">Copy</button>
                            <button class="small outline danger" style="border-color:var(--danger); color:var(--danger);" onclick="promptDeleteRecipe('${id}')">Del</button>
                        </div>
                    </div>
                    <div style="text-align: center; width: 100%;">
                        <input type="text" class="header-input" value="${recipe.name.replace(/"/g, '&quot;')}" onblur="updateRecipeName('${id}', this.value)" onkeypress="if(event.key === 'Enter') this.blur();" style="margin-bottom: 0.2rem;">
                    </div>
                    <div style="text-align: center; display: flex; justify-content: center; align-items: center; gap: 0.5rem; margin-top: 0.3rem;">
                        <span style="font-size: 0.8rem; opacity: 0.8; color:var(--text-muted);">Folder:</span>
                        <select class="header-select" onchange="updateRecipeCategory('${id}', this.value)">
                            ${folders.map(f => `<option value="${f}" ${f === currentCat ? 'selected' : ''}>${f}</option>`).join('')}
                        </select>
                    </div>
                </header>
                <div class="container" style="margin-top: 1rem;">
                    
                    <div class="scale-controls">
                        <div>
                            <label style="font-weight:bold; color:var(--primary); font-size:0.8rem; display:block;">Base Yield / Batch</label>
                            <input type="number" min="0.1" step="0.1" value="${recipe.baseBatch || 1}" 
                                   onblur="updateBaseBatch('${id}', this.value)" 
                                   onkeypress="if(event.key === 'Enter') this.blur();">
                        </div>
                        <div style="font-size: 1.5rem; color: var(--border); padding-top: 1rem;">×</div>
                        <div>
                            <label style="font-weight:bold; color:var(--primary); font-size:0.8rem; display:block;">View Multiplier</label>
                            <input type="number" min="0.1" step="0.1" value="${currentScale}" 
                                   oninput="if(this.value !== '') setScale(parseFloat(this.value));">
                        </div>
                    </div>

                    <div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;">
                            <div>
                                <h2 style="margin:0; border:none; padding:0;">Ingredients</h2>
                                <small style="color:var(--text-muted); font-weight:bold;">Total: ${Number.isInteger(totalRecipeWeight) ? totalRecipeWeight : totalRecipeWeight.toFixed(2)} g</small>
                            </div>
                            <div style="display:flex; gap:0.5rem;">
                                <button class="small outline" onclick="promptAddIngredient('${id}')">+ Ing.</button>
                                <button class="small outline" onclick="promptAddSubRecipe('${id}')">+ Comp.</button>
                            </div>
                        </div>
                        <div id="ingredients-list">
                            ${recipe.ingredients.length === 0 ? '<div class="empty-state">No ingredients yet.</div>' : ''}
                            ${renderIngredientTree(recipe.ingredients, currentScale, 0, 'root')}
                        </div>
                    </div>

                    <div class="card">
                        <h2>Notes</h2>
                        <textarea rows="4" placeholder="Add preparation notes here..." onblur="updateNotes('${id}', this.value)">${recipe.notes || ''}</textarea>
                    </div>
                </div>
            `;
        }

        // --- Basic UI Actions ---
        window.toggleSub = (pathId) => { expandedNodes.has(pathId) ? expandedNodes.delete(pathId) : expandedNodes.add(pathId); render(); };
        window.goToFolder = (folderName) => { currentView = 'folder'; currentFolder = folderName; render(); };
        window.goHome = () => { currentView = 'home'; currentFolder = null; currentRecipeId = null; currentScale = 1; expandedNodes.clear(); render(); };
        window.goToRecipe = (id) => { currentView = 'recipe'; currentRecipeId = id; currentScale = 1; expandedNodes.clear(); render(); };
        window.setScale = (scale) => { currentScale = scale || 1; render(); };
        window.updateNotes = (recipeId, text) => { recipes[recipeId].notes = text; saveData(); };
        
        window.updateRecipeName = (id, newName) => {
            const trimmed = newName.trim();
            if (trimmed && trimmed !== recipes[id].name) { recipes[id].name = trimmed; saveData(); }
            render(); 
        };
        
        window.updateBaseBatch = (id, val) => {
            const num = parseFloat(val) || 1;
            recipes[id].baseBatch = num;
            saveData();
            render();
        }

        window.updateRecipeCategory = (id, newCat) => {
            recipes[id].category = newCat;
            saveData();
            goToFolder(newCat);
        };

        window.confirmRenameFolder = (oldName, newName) => {
            newName = newName.trim();
            if (!newName || newName === oldName) return render();
            if (folders.includes(newName)) { showToast("Folder already exists."); return render(); }

            folders = folders.map(f => f === oldName ? newName : f);
            Object.values(recipes).forEach(r => {
                if (r.category === oldName) r.category = newName;
            });
            saveData(); 
            currentFolder = newName; 
            render();
        };

        window.promptCopyRecipe = (id) => {
            const original = recipes[id];
            const newId = generateId();
            const copy = JSON.parse(JSON.stringify(original));
            copy.id = newId;
            copy.name = copy.name + " (Copy)";
            copy.orderIndex = Date.now();
            recipes[newId] = copy;
            saveData();
            showToast("Recipe duplicated!");
            goToRecipe(newId);
        };

        function closeModal() { modalRoot.innerHTML = ''; }

        // --- Cloud Sync Feature (Hardcoded Config) ---
        window.promptCloudConfig = () => {
            const config = JSON.parse(localStorage.getItem('kitchen_secret_gh_config')) || {};
            modalRoot.innerHTML = `
                <div class="modal-overlay" onclick="closeModal()">
                    <div class="modal-card" onclick="event.stopPropagation()">
                        <h2 style="border:none;">Cloud Sync</h2>
                        <div class="form-group">
                            <label>GitHub Token (PAT)</label>
                            <input type="password" id="gh-token" value="${config.token || ''}" placeholder="ghp_...">
                        </div>
                        <label style="display:flex; align-items:center; gap:0.5rem; margin-top:1rem; cursor:pointer;">
                            <input type="checkbox" id="gh-autosave" style="width:auto;" ${config.autoSave ? 'checked' : ''}>
                            <span>Auto-save to cloud on changes</span>
                        </label>
                        <div class="modal-actions" style="justify-content: space-between; margin-top: 1.5rem;">
                            <button class="outline" onclick="loadFromCloud()">↓ Load</button>
                            <div style="display:flex; gap:0.5rem;">
                                <button class="outline" onclick="saveToCloud(true)">↑ Save</button>
                                <button onclick="saveCloudConfig()">Done</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        };

        window.saveCloudConfig = () => {
            const config = {
                token: document.getElementById('gh-token').value.trim(),
                autoSave: document.getElementById('gh-autosave').checked
            };
            localStorage.setItem('kitchen_secret_gh_config', JSON.stringify(config));
            closeModal();
            showToast("Cloud config saved.");
            if (config.autoSave) triggerCloudSave();
        };

        window.saveToCloud = async (manual = false) => {
            const config = JSON.parse(localStorage.getItem('kitchen_secret_gh_config'));
            if (!config || !config.token) {
                if (manual) showToast("Configure cloud settings first!");
                return;
            }
            if (manual) showToast("Saving to cloud...");
            
            // Hardcoded Routing
            const owner = 'therealikage';
            const repo = 'yen-recipes-cloud';
            const path = 'recipes.json';
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            const headers = { 'Authorization': `token ${config.token}`, 'Accept': 'application/vnd.github.v3+json' };
            
            try {
                let sha = '';
                const getRes = await fetch(url, { headers });
                if (getRes.ok) sha = (await getRes.json()).sha;
                
                const payload = btoa(unescape(encodeURIComponent(JSON.stringify({recipes, folders}))));
                const body = JSON.stringify({ message: 'Kitchen Secret Sync', content: payload, sha });
                
                const putRes = await fetch(url, { method: 'PUT', headers, body });
                if (putRes.ok && manual) showToast("Successfully saved to cloud!");
                else if (!putRes.ok && manual) showToast("Cloud save failed.");
            } catch(e) { 
                console.error(e);
                if (manual) showToast("Network error during save.");
            }
        };

        window.loadFromCloud = async () => {
            const config = JSON.parse(localStorage.getItem('kitchen_secret_gh_config'));
            if (!config || !config.token) return showToast("Configure cloud settings first!");
            
            showToast("Loading from cloud...");
            
            // Hardcoded Routing
            const owner = 'therealikage';
            const repo = 'yen-recipes-cloud';
            const path = 'recipes.json';
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
            const headers = { 'Authorization': `token ${config.token}`, 'Accept': 'application/vnd.github.v3+json' };
            
            try {
                const res = await fetch(url, { headers });
                if (!res.ok) throw new Error("Failed to fetch");
                const data = await res.json();
                const decoded = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                
                if (decoded.recipes) {
                    recipes = decoded.recipes;
                    folders = decoded.folders || [];
                    syncDataStructure();
                    saveData(false); // Don't loop autosave on load
                    closeModal();
                    render();
                    showToast("Successfully loaded from cloud!");
                }
            } catch(e) {
                console.error(e);
                showToast("Failed to load from cloud.");
            }
        };

        // --- Modals ---
        window.promptAddFolder = () => {
            modalRoot.innerHTML = `
                <div class="modal-overlay" onclick="closeModal()">
                    <div class="modal-card" onclick="event.stopPropagation()">
                        <h2 style="border:none;">Create Folder</h2>
                        <div class="form-group">
                            <input type="text" id="new-folder-name" placeholder="e.g. Pastries" autofocus>
                        </div>
                        <div class="modal-actions">
                            <button class="outline" onclick="closeModal()">Cancel</button>
                            <button onclick="confirmAddFolder()">Create</button>
                        </div>
                    </div>
                </div>
            `;
            setTimeout(() => document.getElementById('new-folder-name').focus(), 100);
        };

        window.confirmAddFolder = () => {
            const name = document.getElementById('new-folder-name').value.trim();
            if (name && !folders.includes(name)) {
                folders.push(name);
                saveData(); closeModal(); render();
            } else if (folders.includes(name)) {
                showToast("Folder already exists.");
            }
        };

        window.promptDeleteFolder = (folderName) => {
            modalRoot.innerHTML = `
                <div class="modal-overlay" onclick="closeModal()">
                    <div class="modal-card" onclick="event.stopPropagation()">
                        <h2 style="border:none; color:var(--danger);">Delete Folder?</h2>
                        <p style="margin-bottom:1rem;">Are you sure you want to delete <b>${folderName}</b>?</p>
                        <p style="color:var(--text-muted); font-size:0.85rem;">Recipes inside will be moved to 'Uncategorized'.</p>
                        <div class="modal-actions">
                            <button class="outline" onclick="closeModal()">Cancel</button>
                            <button class="danger" onclick="confirmDeleteFolder('${folderName.replace(/'/g, "\\'")}')">Delete</button>
                        </div>
                    </div>
                </div>
            `;
        };

        window.confirmDeleteFolder = (folderName) => {
            folders = folders.filter(f => f !== folderName);
            Object.values(recipes).forEach(r => {
                if (r.category === folderName) r.category = 'Uncategorized';
            });
            saveData(); closeModal(); goHome();
        };

        window.promptAddRecipe = (targetFolder) => {
            modalRoot.innerHTML = `
                <div class="modal-overlay" onclick="closeModal()">
                    <div class="modal-card" onclick="event.stopPropagation()">
                        <h2 style="border:none;">Create Recipe</h2>
                        <div class="form-group">
                            <input type="text" id="new-recipe-name" placeholder="e.g. Chocolate Cake" autofocus>
                        </div>
                        <div class="modal-actions">
                            <button class="outline" onclick="closeModal()">Cancel</button>
                            <button onclick="confirmAddRecipe('${targetFolder.replace(/'/g, "\\'")}')">Create</button>
                        </div>
                    </div>
                </div>
            `;
            setTimeout(() => document.getElementById('new-recipe-name').focus(), 100);
        };

        window.confirmAddRecipe = (targetFolder) => {
            const name = document.getElementById('new-recipe-name').value.trim();
            if (name) {
                const id = generateId();
                recipes[id] = { id, name, category: targetFolder, orderIndex: Date.now(), baseBatch: 1, ingredients: [], notes: "" };
                saveData(); closeModal(); goToRecipe(id);
            }
        };

        window.promptAddIngredient = (recipeId) => {
            modalRoot.innerHTML = `
                <div class="modal-overlay" onclick="closeModal()">
                    <div class="modal-card" onclick="event.stopPropagation()">
                        <h2 style="border:none;">Add Ingredient</h2>
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" id="ing-name" placeholder="e.g. Sugar, Flour">
                        </div>
                        <div class="form-group">
                            <label>Quantity (grams)</label>
                            <input type="number" id="ing-qty" value="1" step="0.1" min="0.1">
                        </div>
                        <div class="modal-actions">
                            <button class="outline" onclick="closeModal()">Cancel</button>
                            <button onclick="confirmAddIngredient('${recipeId}')">Add</button>
                        </div>
                    </div>
                </div>
            `;
            setTimeout(() => document.getElementById('ing-name').focus(), 100);
        };

        window.confirmAddIngredient = (recipeId) => {
            const name = document.getElementById('ing-name').value.trim();
            const qty = parseFloat(document.getElementById('ing-qty').value) || 0;
            if (!name) return;
            recipes[recipeId].ingredients.push({ name, qty, unit: 'g', isSub: false, subId: null });
            saveData(); closeModal(); render();
        };

        window.promptAddSubRecipe = (recipeId) => {
            const availableRecipes = Object.values(recipes).filter(r => r.id !== recipeId);

            modalRoot.innerHTML = `
                <div class="modal-overlay" onclick="closeModal()">
                    <div class="modal-card" onclick="event.stopPropagation()">
                        <h2 style="border:none;">Add Component</h2>
                        <div class="form-group">
                            <label>Select Component</label>
                            <select id="sub-recipe-select" onchange="updateSubAddDefaults()">
                                ${availableRecipes.map(r => `<option value="${r.id}" data-batch="${r.baseBatch||1}">${r.name} (${r.category || 'Uncategorized'})</option>`).join('')}
                                <option value="NEW">+ Create New Component</option>
                            </select>
                            <input type="text" id="new-sub-name" placeholder="New Component Name" style="display:none; margin-top:0.5rem;">
                        </div>
                        <div class="form-group">
                            <label>Scale By</label>
                            <select id="sub-scale-mode" onchange="toggleSubScaleMode()">
                                <option value="batch">Target Batch Size</option>
                                <option value="multiplier">Multiplier (x)</option>
                                <option value="weight">Target Total Weight (g)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label id="sub-qty-label">Target Batch</label>
                            <input type="number" id="sub-qty" value="1" step="0.1" min="0.1">
                        </div>
                        <div class="modal-actions">
                            <button class="outline" onclick="closeModal()">Cancel</button>
                            <button onclick="confirmAddSubRecipe('${recipeId}')">Add</button>
                        </div>
                    </div>
                </div>
            `;
            updateSubAddDefaults();
        };

        window.updateSubAddDefaults = () => {
            const select = document.getElementById('sub-recipe-select');
            const newNameInput = document.getElementById('new-sub-name');
            const mode = document.getElementById('sub-scale-mode').value;
            
            if (select.value === 'NEW') {
                newNameInput.style.display = 'block';
                if (mode === 'batch') document.getElementById('sub-qty').value = 1;
            } else {
                newNameInput.style.display = 'none';
                if (mode === 'batch' && select.options.length > 0) {
                    const batch = select.options[select.selectedIndex].getAttribute('data-batch');
                    document.getElementById('sub-qty').value = batch;
                }
            }
        };

        window.toggleSubScaleMode = () => {
            const mode = document.getElementById('sub-scale-mode').value;
            const label = document.getElementById('sub-qty-label');
            const input = document.getElementById('sub-qty');
            
            if (mode === 'weight') {
                label.textContent = 'Target Total Weight (g)';
                input.value = 100;
            } else if (mode === 'multiplier') {
                label.textContent = 'Multiplier (x)';
                input.value = 1;
            } else if (mode === 'batch') {
                label.textContent = 'Target Batch';
                updateSubAddDefaults();
            }
        };

        window.confirmAddSubRecipe = (recipeId) => {
            let subId = document.getElementById('sub-recipe-select').value;
            const mode = document.getElementById('sub-scale-mode').value;
            const val = parseFloat(document.getElementById('sub-qty').value) || 1;
            
            if (subId === 'NEW') {
                const newName = document.getElementById('new-sub-name').value.trim();
                if (!newName) {
                    showToast("Please enter a name for the new component.");
                    return;
                }
                subId = generateId();
                recipes[subId] = { 
                    id: subId, 
                    name: newName, 
                    category: 'Subcomponents', 
                    orderIndex: Date.now(), 
                    baseBatch: 1, 
                    ingredients: [], 
                    notes: "" 
                };
                syncDataStructure();
                saveData();
                showToast(`Created new component: ${newName}`);
            } else if (!subId) return;

            const ing = { name: recipes[subId].name, unit: 'g', isSub: true, subId: subId, scaleMode: mode };
            if (mode === 'weight') { ing.targetWeight = val; ing.qty = 1; }
            else if (mode === 'batch') { ing.targetBatch = val; ing.qty = 1; }
            else { ing.qty = val; ing.targetWeight = 0; }

            recipes[recipeId].ingredients.push(ing);
            saveData(); closeModal(); render();
        };

        window.promptEditIngredient = (recipeId, index) => {
            const ing = recipes[recipeId].ingredients[index];
            const isSub = ing.isSub;
            const subRecipe = isSub ? recipes[ing.subId] : null;
            const displayName = isSub && subRecipe ? subRecipe.name : ing.name;

            let subHtml = '';
            if (isSub) {
                const mode = ing.scaleMode || 'multiplier';
                let val = 1;
                let label = 'Multiplier (x)';
                if (mode === 'weight') { val = ing.targetWeight || 0; label = 'Target Total Weight (g)'; }
                else if (mode === 'batch') { val = ing.targetBatch || subRecipe?.baseBatch || 1; label = 'Target Batch'; }
                else { val = ing.qty || 1; }
                
                subHtml = `
                    <div class="form-group">
                        <label>Scale By</label>
                        <select id="edit-sub-scale-mode" onchange="toggleEditSubScaleMode()">
                            <option value="batch" ${mode === 'batch' ? 'selected' : ''}>Target Batch Size</option>
                            <option value="multiplier" ${mode === 'multiplier' ? 'selected' : ''}>Multiplier (x)</option>
                            <option value="weight" ${mode === 'weight' ? 'selected' : ''}>Target Total Weight (g)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label id="edit-sub-qty-label">${label}</label>
                        <input type="number" id="edit-ing-qty" value="${val}" step="0.1" min="0.1">
                    </div>
                `;
            } else {
                subHtml = `
                    <div class="form-group">
                        <label>Quantity (grams)</label>
                        <input type="number" id="edit-ing-qty" value="${ing.qty}" step="0.1" min="0.1">
                    </div>
                `;
            }

            modalRoot.innerHTML = `
                <div class="modal-overlay" onclick="closeModal()">
                    <div class="modal-card" onclick="event.stopPropagation()">
                        <h2 style="border:none;">Edit ${isSub ? 'Component' : 'Ingredient'}</h2>
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" id="edit-ing-name" value="${displayName.replace(/"/g, '&quot;')}" ${isSub ? 'disabled' : ''}>
                        </div>
                        ${subHtml}
                        <div class="modal-actions">
                            <button class="outline" onclick="closeModal()">Cancel</button>
                            <button onclick="confirmEditIngredient('${recipeId}', ${index})">Save</button>
                        </div>
                    </div>
                </div>
            `;
            if (!isSub) setTimeout(() => document.getElementById('edit-ing-name').focus(), 100);
        };

        window.toggleEditSubScaleMode = () => {
            const mode = document.getElementById('edit-sub-scale-mode').value;
            const label = document.getElementById('edit-sub-qty-label');
            if (mode === 'weight') label.textContent = 'Target Total Weight (g)';
            else if (mode === 'batch') label.textContent = 'Target Batch Size';
            else label.textContent = 'Multiplier (x)';
        };

        window.confirmEditIngredient = (recipeId, index) => {
            const ing = recipes[recipeId].ingredients[index];
            if (!ing.isSub) {
                const newName = document.getElementById('edit-ing-name').value.trim();
                if (newName) ing.name = newName;
                ing.qty = parseFloat(document.getElementById('edit-ing-qty').value) || 0;
            } else {
                const mode = document.getElementById('edit-sub-scale-mode').value;
                const val = parseFloat(document.getElementById('edit-ing-qty').value) || 0;
                ing.scaleMode = mode;
                if (mode === 'weight') ing.targetWeight = val;
                else if (mode === 'batch') ing.targetBatch = val;
                else ing.qty = val;
            }
            saveData(); closeModal(); render();
        };

        window.promptDeleteRecipe = (id) => {
            modalRoot.innerHTML = `
                <div class="modal-overlay" onclick="closeModal()">
                    <div class="modal-card" onclick="event.stopPropagation()">
                        <h2 style="border:none; color:var(--danger);">Delete Recipe?</h2>
                        <p>Are you sure you want to permanently delete this recipe?</p>
                        <div class="modal-actions">
                            <button class="outline" onclick="closeModal()">Cancel</button>
                            <button class="danger" onclick="confirmDeleteRecipe('${id}')">Delete</button>
                        </div>
                    </div>
                </div>
            `;
        };

        window.confirmDeleteRecipe = (id) => { 
            const folder = recipes[id].category || 'Uncategorized';
            delete recipes[id]; 
            saveData(); 
            closeModal(); 
            goToFolder(folder);
        };

        window.promptRemoveIngredient = (recipeId, index) => {
            modalRoot.innerHTML = `
                <div class="modal-overlay" onclick="closeModal()">
                    <div class="modal-card" onclick="event.stopPropagation()">
                        <h2 style="border:none; color:var(--danger);">Remove Item?</h2>
                        <div class="modal-actions">
                            <button class="outline" onclick="closeModal()">Cancel</button>
                            <button class="danger" onclick="confirmRemoveIngredient('${recipeId}', ${index})">Remove</button>
                        </div>
                    </div>
                </div>
            `;
        };

        window.confirmRemoveIngredient = (recipeId, index) => { recipes[recipeId].ingredients.splice(index, 1); saveData(); closeModal(); render(); };

        window.exportData = () => {
            const data = localStorage.getItem('kitchen_secret_recipes');
            const blob = new Blob([data], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'forms-by-yen-recipes.json'; a.click();
        };

        window.importData = (event) => {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => { 
                recipes = JSON.parse(e.target.result); 
                syncDataStructure(); 
                saveData(false); 
                render(); 
                showToast("Import successful!");
            };
            reader.readAsText(file);
        };

        function showToast(message) {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
                background: var(--primary); color: var(--bg); padding: 12px 24px;
                border-radius: 30px; font-weight: bold; font-size: 0.95rem; z-index: 1000;
                box-shadow: 0 4px 15px rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.3s;
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.style.opacity = '1', 10);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        render();
    </script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered successfully!', reg))
                    .catch(err => console.error('Service Worker registration failed:', err));
            });
        }
    </script>
</body>
</html>
